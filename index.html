<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>

    .divider {
      height: 1px;
      background: rgba(0,0,0,0.12);
      margin: 18px 0;
    }
    
    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, sans-serif;
      font-weight: bold;

      /* light base */
      background-color: #f4f4f4;

      /* grid paper effect */
      background-image:
        linear-gradient(to right, rgba(0,0,0,0.06) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0,0,0,0.06) 1px, transparent 1px);

      background-size: 20px 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      padding: 18px;
      font-size: 16px;
      border: none;
      border-radius: 14px;
      background: #9CAF88; /* sage green */
      color: white;
      font-weight: 600;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    button:active {
      transform: scale(0.98);
    }
  </style>
</head>

<body>

  <div class="grid">
    <button onclick="openLink('https://docs.google.com/spreadsheets/d/1iAIpPB8E1OGJeiqRQpiGMC1EkhNp4793FxSKN3PKRw8/edit')">Work Work</button>
    <button onclick="openLink('https://docs.google.com/spreadsheets/d/1uT3K_eaYQCWMVPRobpvZx5cFjYvrMspkb5-7KII2et4/edit')">College Planning</button>
    <button onclick="openLink('https://employeeservices.swarthmore.edu/EmployeeSelfService/ssb/hrDashboard#/hrDashboard')">Employee Dashboard</button>
    <button onclick="openLink('https://docs.google.com/spreadsheets/d/1JjVk1r953MLBSgJ2AlZ6epiW_tBqzuPYawXQGMtWF0o/edit')">Turk-Hofmann Calendar</button>
    
  </div>

  <div class="divider"></div>

  <div class="grid">
    <button onclick="openLink('https://docs.google.com/spreadsheets/d/1m-mTplvmgq6FHDKhc6qJ3vzh4nDl9TZo/edit?gid=846467104#gid=846467104')">BuildMo Schedule</button>
    <button onclick="openLink('https://my.adp.com/#/dashboard/main?npcr=true')">ADP</button>
  </div>

  <div class="divider"></div>

  <div class="grid">
    <button onclick="openLink('https://docs.google.com/spreadsheets/d/14pG7r0lR28QTyMA45ip97NUdNEL3sLPNceo1mp0oHUA/edit?gid=791331572#gid=791331572')">Master Shift Sheet</button>
    <button onclick="openLink('https://docs.google.com/spreadsheets/d/1QlcGS9k3v-sjCvIx0vPOGvkv4FIHaIb7p7JAKuqo9QU/edit?gid=792619191#gid=792619191')">Manager Hours</button>
    <button onclick="openLink('https://docs.google.com/spreadsheets/d/1AMBK30pKpr6wUDFXWekkqkcZ_K45c1foeZSlw58hwTo/edit?gid=551824531#gid=551824531')">Published Sign-Ups</button>
    <button onclick="openLink('https://docs.google.com/spreadsheets/d/1V5ObpQfXMUIsPF6mt1mueXzwlfOPy25KQ19OwtUONBQ/edit?gid=0#gid=0')">Master To Log</button>
    <button onclick="openLink('https://drive.google.com/drive/folders/1wccxRwi_VGWiG_fl-kja8IKU_736ZyrP?usp=share_link')">Manager Folder</button>
  </div>

  <div class="divider"></div>
  <div class="grid">
    <button onclick="openLink('https://docs.google.com/spreadsheets/d/1rJHJ1iem1WkpiaFO7DP5yvVsKwOhaXkLRkSeDJPQuk0/edit?gid=0#gid=0')">More Links</button>
  </div>
  
  <script>
    function openLink(url) {
      window.location.href = url;
    }
  </script>

</body>
</html>
