<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, sans-serif;
      background: #f2f2f2; /* light grey grid background */
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      padding: 18px;
      font-size: 16px;
      border: none;
      border-radius: 14px;
      background: #9CAF88; /* sage green */
      color: white;
      font-weight: 600;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    button:active {
      transform: scale(0.98);
    }
  </style>
</head>

<body>

  <div class="grid">
    <button onclick="openSheet('YOUR_SHEET_ID_1')">Sales</button>
    <button onclick="openSheet('YOUR_SHEET_ID_2')">Inventory</button>
  </div>

  <script>
    function openSheet(id) {
      window.location.href =
        "https://docs.google.com/spreadsheets/d/" + id + "/edit";
    }
  </script>

</body>
</html>
