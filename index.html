<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: -apple-system, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }

    button {
      width: 100%;
      padding: 20px;
      margin: 10px 0;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      background: #2d6cdf;
      color: white;
    }
  </style>
</head>

<body>

  <button onclick="openSheet('YOUR_SHEET_ID_1')">Sales</button>
  <button onclick="openSheet('YOUR_SHEET_ID_2')">Inventory</button>
  <button onclick="openSheet('YOUR_SHEET_ID_3')">Reports</button>

  <script>
    function openSheet(id) {
      window.location.href =
        "https://docs.google.com/spreadsheets/d/" + id + "/edit";
    }
  </script>

</body>
</html>
