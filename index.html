<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>

    .divider {
      height: 1px;
      background: rgba(0,0,0,0.12);
      margin: 18px 0;
    }
    
    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, sans-serif;
      font-weight: bold;

      /* light base */
      background-color: #f4f4f4;

      /* grid paper effect */
      background-image:
        linear-gradient(to right, rgba(0,0,0,0.06) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0,0,0,0.06) 1px, transparent 1px);

      background-size: 20px 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      padding: 18px;
      font-size: 16px;
      border: none;
      border-radius: 14px;
      background: #9CAF88; /* sage green */
      color: white;
      font-weight: 600;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    button:active {
      transform: scale(0.98);
    }
  </style>
</head>

<body>

  <div class="grid">
    <button onclick="openLink('https://docs.google.com/spreadsheets/d/1uT3K_eaYQCWMVPRobpvZx5cFjYvrMspkb5-7KII2et4/edit')">College Planning</button>
    <button onclick="openLink('https://docs.google.com/spreadsheets/d/1iAIpPB8E1OGJeiqRQpiGMC1EkhNp4793FxSKN3PKRw8/edit')">Work Work</button>
    <button onclick="openLink('https://docs.google.com/spreadsheets/d/1JjVk1r953MLBSgJ2AlZ6epiW_tBqzuPYawXQGMtWF0o/edit')">Turk-Hofmann Calendar</button>
    <button onclick="openLink('https://employeeservices.swarthmore.edu/EmployeeSelfService/ssb/hrDashboard#/hrDashboard')">Employee Dashboard</button>
    
  </div>

  <div class="divider"></div>

  <div class="grid">
    <button onclick="openLink('https://docs.google.com/spreadsheets/d/1uT3K_eaYQCWMVPRobpvZx5cFjYvrMspkb5-7KII2et4/edit')">College Planning</button>
    <button onclick="openLink('https://example.com')">Inventory</button>
  </div>
  
  <script>
    function openLink(url) {
      window.location.href = url;
    }
  </script>

</body>
</html>
